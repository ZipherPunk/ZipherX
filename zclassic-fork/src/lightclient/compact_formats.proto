syntax = "proto3";
package cash.z.wallet.sdk.rpc;

// Block identifier containing height and hash
message BlockID {
    uint64 blockHeight = 1;
    bytes blockHash = 2;  // 32-byte block hash
}

// Compact representation of a block for light clients
// Omits witness data and full transaction details
message CompactBlock {
    BlockID id = 1;
    repeated CompactTx vtx = 3;  // Skip field 2 for compatibility
}

// Compact representation of a transaction
// Contains only the data needed for trial decryption and nullifier tracking
message CompactTx {
    uint64 txIndex = 1;           // Index within block
    bytes txHash = 2;             // 32-byte transaction hash
    repeated CompactSpend spends = 3;
    repeated CompactOutput outputs = 4;
}

// Compact Sapling spend - only the nullifier
// Used to detect when notes are spent
message CompactSpend {
    bytes nf = 1;  // 32-byte nullifier
}

// Compact Sapling output - minimal data for trial decryption
// Contains just enough to decrypt and verify ownership
message CompactOutput {
    bytes cmu = 1;         // 32-byte note commitment
    bytes epk = 2;         // 32-byte ephemeral public key
    bytes ciphertext = 3;  // 52 bytes (first 52 bytes of full ciphertext)
                          // Contains note plaintext for trial decryption
                          // Omits 512-byte memo and authentication tag
}
